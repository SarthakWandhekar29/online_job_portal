<!DOCTYPE html>
<html>

<head>
    <title>Manager Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #141e30, #243b55, #0f2027, #1c1c1c);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            color: white;
            padding: 20px;
        }
        
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 15px cyan;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        
        .top-bar form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        input,
        select {
            padding: 8px;
            border-radius: 8px;
            border: none;
        }
        
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: cyan;
            font-weight: bold;
        }
        
        .logout {
            padding: 8px 12px;
            background: red;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }
        /* Card Grid */
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* Maximum 4 per row */
            gap: 22px;
        }
        
        .employee-card {
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 20px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }
        
        .employee-card:hover {
            transform: translateY(-8px);
            background: rgba(0, 255, 255, 0.08);
        }
        
        .employee-card h3 {
            margin-bottom: 12px;
            text-shadow: 0 0 8px cyan;
        }
        
        .employee-card p {
            margin: 6px 0;
            font-size: 14px;
        }
        
        .contact-btn {
            display: inline-block;
            background: #00ff99;
            color: black;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 12px;
            font-weight: bold;
        }
        
        @media(max-width:768px) {
            .top-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="particles-js"></div>

    <h2>Available Labours</h2>

    <div class="top-bar">

        <form method="GET">
            <input type="text" name="search" placeholder="Search by Skill">

            <select name="sort">
            <option value="">Sort by Wage</option>
            <option value="low">Low to High</option>
            <option value="high">High to Low</option>
        </select>

            <button type="submit">Apply</button>
        </form>

        <a href="/logout" class="logout">Logout</a>

    </div>

    <!-- Employee Card Grid -->

    <div class="card-grid">

        {% for l in labors %}
        <div class="employee-card">

            <h3>{{ l[1] }}</h3>

            <p>🛠 Skill : {{ l[4] }}</p>
            <p>📊 Experience : {{ l[5] }} years</p>
            <p>📍 Location : {{ l[3] }}</p>
            <p>💰 Expected Wage : {{ l[7] }}</p>

            <a href="/contact/{{ l[0] }}" class="contact-btn">
            Contact
        </a>

        </div>
        {% endfor %}

    </div>


    <!-- <h2 style="margin-top:50px;">
        Requested Labours ({{ requests|length }})
    </h2>

    <div class="card-grid">

        {% for r in requests %}
        <div class="employee-card">

            <h3>{{ r[1] }}</h3>
            <p>Skill : {{ r[2] }}</p>
            <p>Status : {{ r[3] }}</p>

            {% if r[3] == "Pending" %}
            <a href="/hire/{{ r[0] }}" class="contact-btn">Hire</a> {% endif %}

        </div>
        {% endfor %}

    </div> -->
    <script>
        particlesJS("particles-js", {
            particles: {
                number: {
                    value: 60
                },
                size: {
                    value: 3
                },
                move: {
                    speed: 2
                },
                line_linked: {
                    enable: true
                }
            }
        });
    </script>

</body>

</html>
