<!DOCTYPE html>
<html>

<head>
    <title>Labour Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            color: white;
            padding: 20px;
        }
        
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 15px cyan;
        }
        
        .logout {
            display: inline-block;
            padding: 8px 15px;
            background: red;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 25px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        /* Card Grid */
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
        }
        
        .job-card {
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 20px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }
        
        .job-card:hover {
            transform: translateY(-8px);
            background: rgba(0, 255, 255, 0.08);
            box-shadow: 0 0 20px cyan;
        }
        
        .job-card h3 {
            margin-bottom: 12px;
            text-shadow: 0 0 8px cyan;
        }
        
        .job-card p {
            margin: 6px 0;
            font-size: 14px;
        }
        
        .apply-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 14px;
            border-radius: 8px;
            background: #00ff99;
            color: black;
            font-weight: bold;
            text-decoration: none;
            transition: .3s;
        }
        
        .apply-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #00ff99;
        }
        
        @media(max-width:768px) {
            .top-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="particles-js"></div>

    <h2>Available Jobs</h2>

    <div class="top-bar">
        <div></div>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- Card Grid -->

    <div class="card-grid">

        {% for j in jobs %}
        <div class="job-card">

            <h3>{{ j[1] }}</h3>

            <p>💼 Job Title : {{ j[3] }}</p>
            <p>⏰ Working Time : {{ j[4] }}</p>
            <p>📌 Job Type : {{ j[5] }}</p>
            <p>🛠 Required Skill : {{ j[6] }}</p>
            <p>💰 Daily Wage : ₹ {{ j[7] }}</p>
            <form method="POST" action="/apply/{{ j[0] }}">
                <button type="submit">Apply</button>
            </form>

        </div>
        {% endfor %}

    </div>

    <script>
        particlesJS("particles-js", {
            particles: {
                number: {
                    value: 70
                },
                size: {
                    value: 3
                },
                move: {
                    speed: 2
                },
                line_linked: {
                    enable: true
                }
            }
        });
    </script>

</body>

</html>
