<!DOCTYPE html>
<html>

<head>
    <title>Contact Labour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Particles JS -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, #1d2671, #c33764);
        }
        
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .glass-card {
            position: relative;
            z-index: 1;
            width: 420px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            color: white;
            animation: fadeIn 1s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            min-height: 28px;
        }
        
        label {
            font-size: 14px;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        input[readonly] {
            background: rgba(255, 255, 255, 0.08);
        }
        
        textarea {
            resize: none;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.4s;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 114, 255, 0.6);
        }
    </style>
</head>

<body>

    <div id="particles-js"></div>

    <div class="glass-card">
        <h2 id="typing"></h2>

        <form method="POST">

            <label>To</label>
            <input type="email" value="{{ labour_email }}" readonly>

            <label>Subject</label>
            <input type="text" value="{{ subject }}" readonly>

            <label>Message</label>
            <textarea name="message" rows="5" required></textarea>

            <button type="submit">Send Email</button>

        </form>
    </div>

    <!-- Typing Animation -->
    <script>
        const text = "Contact {{ labour_name }}";
        let index = 0;

        function typeEffect() {
            if (index < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeEffect, 70);
            }
        }
        typeEffect();
    </script>

    <!-- Particles Config -->
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 60
                },
                "size": {
                    "value": 3
                },
                "move": {
                    "speed": 2
                },
                "line_linked": {
                    "enable": true
                },
                "color": {
                    "value": "#ffffff"
                }
            }
        });
    </script>

    {% if success %}
    <script>
        Swal.fire({
            title: 'Email Sent!',
            text: 'Your message was delivered successfully.',
            icon: 'success',
            confirmButtonText: 'Go to Dashboard',
            confirmButtonColor: '#0072ff',
            backdrop: `
        rgba(0,0,123,0.4)
    `
        }).then(() => {
            window.location.href = "/manager_dashboard";
        });
    </script>
    {% endif %}

</body>

</html>
